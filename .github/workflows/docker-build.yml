name: Build & Push Blender Serverless Image

on:
  push:
    branches: [ main, master ]
    paths:
      - "blender-backend/**"
      - ".github/workflows/docker-build.yml"
  workflow_dispatch:   # allows manual trigger from GitHub Actions tab

env:
  IMAGE_NAME: moda-blender

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Docker Hub login ───────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 3. Build metadata (tags + labels) ────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      # ── 4. Set up QEMU (multi-platform support, optional) ─────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 5. Set up Docker Buildx ──────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 6. Build and push ────────────────────────────────────────
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./blender-backend
          file: ./blender-backend/Dockerfile.serverless
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers in GitHub Actions cache — speeds up re-builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 7. Print the image digest ────────────────────────────────
      - name: Print image digest
        run: |
          echo "✅ Image pushed successfully"
          echo "Image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest"
          echo "Digest: ${{ steps.build-and-push.outputs.digest }}"
          echo ""
          echo "👉 Use this in RunPod Serverless:"
          echo "   ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest"
